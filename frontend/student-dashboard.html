<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
   

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#eef2f7;
            font-family:'Segoe UI',sans-serif;
        }

        .navbar{
            background:linear-gradient(90deg,#0a1f44,#1f4aa8);
        }

        .hero{
            background:linear-gradient(135deg,#1f4aa8,#0a1f44);
            color:white;
            padding:40px;
            border-radius:15px;
        }

        .highlight-section{
            background:white;
            border-radius:15px;
            padding:30px;
            box-shadow:0 5px 20px rgba(0,0,0,0.05);
        }

        .course-card{
            border-radius:15px;
            border:none;
            transition:0.3s;
        }

        .course-card:hover{
            transform:translateY(-6px);
        }

        .badge-enrolled{
            background:#28a745;
            color:white;
            padding:6px 12px;
            border-radius:20px;
            font-size:12px;
        }

        .badge-new{
            background:#1f4aa8;
            color:white;
            padding:6px 12px;
            border-radius:20px;
            font-size:12px;
        }

        .action-btn{
            border:none;
            padding:10px;
            border-radius:8px;
            width:100%;
            font-weight:500;
            transition:0.3s;
        }

        .video-btn{
            background:linear-gradient(90deg,#ffb400,#ff9800);
            color:black;
        }

        .quiz-btn{
            background:linear-gradient(90deg,#1f4aa8,#3b6edc);
            color:white;
        }

        .action-btn:hover{
            transform:scale(1.03);
        }

        .footer{
            background:#0a1f44;
            color:white;
            padding:25px 0;
            margin-top:50px;
            text-align:center;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark px-4 d-flex justify-content-between">
    <span class="navbar-brand fw-bold">
        VIDHYA VARADHI Student Portal
    </span>

    <div class="dropdown">
        <button class="btn btn-light dropdown-toggle"
            data-bs-toggle="dropdown">
            👤 <span id="username"></span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="viewProfile()">My Profile</a></li>
            <li><a class="dropdown-item" href="#" onclick="viewCourses()">Browse Courses</a></li>
            <li><a class="dropdown-item" href="#" onclick="myCourses()">My Courses</a></li>
            <li>
    <a class="dropdown-item" href="#"
       onclick="myCertificates()">
       My Certificates
    </a>
</li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-4">

    <!-- HERO -->
    <div class="hero mb-4 shadow">
        <h2>Welcome 👋</h2>
        <p>Continue learning and explore new skills.</p>
        <button class="btn btn-light me-2" onclick="viewCourses()">Browse Courses</button>
        <button class="btn btn-warning" onclick="myCourses()">My Learning</button>
    </div>

    <!-- HIGHLIGHT SECTION -->
    <div class="highlight-section mb-4">
        <h5 class="mb-3">📢 Platform Highlights</h5>
        <div id="highlightArea"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="row" id="contentArea"></div>

</div>

<footer class="footer">
    © 2026 Vidhya Varadhi LMS | All Rights Reserved
</footer>

<script>

document.getElementById("username").innerText =
    localStorage.getItem("name");

window.onload = function(){
    loadHighlights();
};


// ===================
// HIGHLIGHTS
// ===================
async function loadHighlights(){

    const res = await fetch("/courses");
    const courses = await res.json();

    document.getElementById("highlightArea").innerHTML = `
        <p><strong>Total Courses:</strong> ${courses.length}</p>
        <p>Explore newly added and recently updated courses in Browse Courses section.</p>
    `;
}


// ===================
// PROFILE
// ===================
function viewProfile(){

    const name = localStorage.getItem("name");
    const email = localStorage.getItem("email");

    document.getElementById("contentArea").innerHTML = `
        <div class="col-md-6 mx-auto">
            <div class="card shadow p-4">
                <h4>Student Profile</h4>
                <p><strong>Name:</strong> ${name}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Role:</strong> Student</p>
            </div>
        </div>
    `;
}


// ===================
// BROWSE COURSES
// ===================
async function viewCourses(){

    const email = localStorage.getItem("email");

    const allRes = await fetch("/courses");
    const allCourses = await allRes.json();

    const myRes = await fetch("/my-courses",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ email })
    });

    const enrolledCourses = await myRes.json();
    const enrolledIds = enrolledCourses.map(c => c.id);

    let output = "";

    allCourses.forEach(course=>{

        const isEnrolled = enrolledIds.includes(course.id);

        output += `
        <div class="col-md-4 mb-4">
            <div class="card shadow course-card p-4">

                <div class="mb-2">
                    ${
                        isEnrolled
                        ? `<span class="badge-enrolled">✔ Enrolled</span>`
                        : `<span class="badge-new">New Course</span>`
                    }
                </div>

                <h5>${course.title}</h5>
                <p class="text-muted">Instructor: ${course.instructor}</p>

                ${
                    isEnrolled
                    ?
                    `<button class="btn btn-secondary w-100" disabled>
                        Already Enrolled
                    </button>`
                    :
                    `<button class="btn btn-success w-100"
                        onclick="enroll(${course.id})">
                        Enroll Now
                    </button>`
                }

            </div>
        </div>
        `;
    });

    document.getElementById("contentArea").innerHTML = output;
}


// ===================
// MY COURSES
// ===================
async function myCourses(){

    const email = localStorage.getItem("email");

    const myRes = await fetch("/my-courses",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ email })
    });

    const data = await res.json();

    let output = "";

    for(const course of data){
        // Check if certificate exists for this course
        const certRes = await fetch("/check-certificate",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ email, course_id: course.id })
        });

        const certData = await certRes.json();
        const hasCertificate = certData.hasCertificate;

        output += `
        <div class="col-md-6 mb-4">
            <div class="card shadow course-card p-4">

                <span class="badge-enrolled mb-2">Enrolled</span>

                <h5>${course.title}</h5>
                <p class="text-muted">${course.instructor}</p>

                <div class="d-grid gap-2 mt-3">`;

        if(hasCertificate){
            output += `
                    <div class="alert alert-success text-center">
                        <i class="bi bi-check-circle-fill"></i>
                        Certificate Completed
                    </div>
                    <button class="action-btn video-btn"
                        onclick="watchVideo(${course.id})">
                        <i class="bi bi-play-circle-fill"></i>
                        Watch Video Again
                    </button>`;
        } else {
            output += `
                    <button class="action-btn video-btn"
                        onclick="watchVideo(${course.id})">
                        <i class="bi bi-play-circle-fill"></i>
                        Watch Video
                    </button>

                    <button class="action-btn quiz-btn"
                        onclick="writeQuiz(${course.id}, '${course.title}')">
                        <i class="bi bi-pencil-square"></i>
                        Write Quiz
                    </button>`;
        }

        output += `
                </div>

            </div>
        </div>
        `;
    }

    document.getElementById("contentArea").innerHTML = output;
}

// ===================
// MY CERTIFICATES
// ===================
async function myCertificates(){

    const email = localStorage.getItem("email");

    try{

        const res = await fetch("/my-certificates",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ email })
        });

        if(!res.ok){
            throw new Error("Server error");
        }

        const certificates = await res.json();

        let output = `
            <div class="col-12">
                <h4 class="mb-4">🎓 My Certificates</h4>
            </div>
        `;

        if(!certificates || certificates.length === 0){

            output += `
                <div class="col-md-6 mx-auto">
                    <div class="card shadow p-4 text-center">
                        <h5>No Certificates Yet</h5>
                        <p class="text-muted">
                            Complete quizzes and assignments to earn certificates.
                        </p>
                    </div>
                </div>
            `;

        } else {

            certificates.forEach(cert => {

                output += `
                <div class="col-md-6 mb-4">
                    <div class="card shadow course-card p-4">

                        <h5>${cert.course_title}</h5>
                        <p class="text-muted">
                            Final Score: <strong>${cert.final_percentage}%</strong>
                        </p>
                        <p class="text-muted">
                            Issued On: 
                            ${cert.issue_date 
                                ? new Date(cert.issue_date).toLocaleDateString()
                                : "N/A"}
                        </p>

                        <div class="d-grid">
                            <a href="/certificates/${cert.certificate_file}">
                               target="_blank"
                               class="btn btn-primary">
                               Download Certificate
                            </a>
                        </div>

                    </div>
                </div>
                `;
            });
        }

        document.getElementById("contentArea").innerHTML = output;

    } catch(error){

        console.error("Certificate Error:", error);

        document.getElementById("contentArea").innerHTML = `
            <div class="col-12 text-center">
                <h5 class="text-danger">
                    Unable to load certificates
                </h5>
            </div>
        `;
    }
}
// ===================
// ENROLL
// ===================
async function enroll(courseId){

   await fetch("/enroll",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            email: localStorage.getItem("email"),
            course_id: courseId
        })
    });

    viewCourses();
}


// ===================
function watchVideo(courseId){
    localStorage.setItem("course_id", courseId);
    window.location.href = "video-player.html";
}

function writeQuiz(courseId, courseTitle){
    localStorage.setItem("quiz_course_id", courseId);
    localStorage.setItem("courseTitle", courseTitle); // ADD THIS
    window.location.href = "quiz.html";
}

function logout(){
    const email = localStorage.getItem("email");

    // Reset quiz progress on logout
    fetch("/logout-reset",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ email })
    }).then(() => {
        localStorage.clear();
        window.location.href = "login.html";
    }).catch(err => {
        console.error("Logout reset failed:", err);
        localStorage.clear();
        window.location.href = "login.html";
    });
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

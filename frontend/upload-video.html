<!DOCTYPE html>
<html>
<head>
    <title>Upload Video | Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:linear-gradient(135deg,#0a1f44,#1f4aa8);
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        .navbar{
            background:transparent;
        }

        .page-container{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .form-card{
            width:100%;
            max-width:600px;
            border-radius:18px;
            border:none;
            overflow:hidden;
        }

        .card-header{
            background:linear-gradient(90deg,#198754,#28a745);
            color:white;
            text-align:center;
            padding:20px;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .upload-area{
            border:2px dashed #28a745;
            border-radius:12px;
            padding:30px;
            text-align:center;
            cursor:pointer;
            transition:0.3s;
        }

        .upload-area:hover{
            background:#f0fff4;
        }

        .upload-btn{
            background:linear-gradient(90deg,#198754,#28a745);
            border:none;
            border-radius:10px;
            padding:12px;
            font-weight:500;
            transition:0.3s;
        }

        .upload-btn:hover{
            transform:scale(1.03);
            box-shadow:0 6px 15px rgba(25,135,84,0.4);
        }

        .footer{
            text-align:center;
            color:white;
            padding:15px;
            font-size:14px;
        }

        #fileName{
            font-size:14px;
            margin-top:10px;
            color:#555;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4 d-flex justify-content-between">
    <span class="navbar-brand fw-bold text-white">
        <i class="bi bi-camera-video-fill"></i>
        VIDHYA VARADHI Admin
    </span>

    <button class="btn btn-light"
        onclick="goBack()">
          Back to Dashboard
    </button>
</nav>

<!-- MAIN CONTENT -->
<div class="page-container">

    <div class="card shadow-lg form-card">

        <div class="card-header">
            <h4><i class="bi bi-cloud-upload-fill"></i> Upload Course Video</h4>
            <small>Add learning videos to your course</small>
        </div>

        <div class="card-body p-4">

            <!-- Course Dropdown -->
            <div class="mb-3">
                <label class="form-label">Select Course</label>
                <select id="course_id" class="form-control"></select>
            </div>

            <!-- Video Title -->
            <div class="mb-3">
                <label class="form-label">Video Title</label>
                <input type="text"
                    id="title"
                    class="form-control"
                    placeholder="Enter video title">
            </div>

            <!-- Drag Drop Upload -->
            <div class="mb-3">
                <label class="form-label">Upload Video File</label>
                <div class="upload-area"
                    onclick="document.getElementById('video').click()">
                    <i class="bi bi-upload fs-1 text-success"></i>
                    <p class="mt-2">Click to upload video</p>
                    <input type="file"
                        id="video"
                        hidden
                        accept="video/*"
                        onchange="showFileName()">
                    <div id="fileName"></div>
                </div>
            </div>

            <button onclick="uploadVideo()"
                class="btn upload-btn w-100 text-white">
                <i class="bi bi-cloud-arrow-up"></i>
                Upload Video
            </button>

            <div id="message" class="mt-3 text-center"></div>

        </div>

    </div>

</div>

<div class="footer">
    © 2026 Vidhya Varadhi LMS | Admin Panel
</div>

<script>

// Load courses in dropdown
window.onload = function(){
    fetch("http://localhost:3000/courses")
    .then(res=>res.json())
    .then(data=>{
        let options = "";
        data.forEach(course=>{
            options += `<option value="${course.id}">
                ${course.title}
            </option>`;
        });
        document.getElementById("course_id").innerHTML = options;
    });
};

function goBack(){
    window.location.href = "admin-dashboard.html";
}

function showFileName(){
    const file = document.getElementById("video").files[0];
    if(file){
        document.getElementById("fileName").innerText =
            "Selected: " + file.name;
    }
}

function uploadVideo(){

    const courseId = document.getElementById("course_id").value;
    const title = document.getElementById("title").value.trim();
    const file = document.getElementById("video").files[0];
    const message = document.getElementById("message");

    if(!courseId || !title || !file){
        message.innerHTML = `
            <div class="alert alert-danger">
                Please fill all fields and select a video.
            </div>
        `;
        return;
    }

    const formData = new FormData();
    formData.append("course_id", courseId);
    formData.append("title", title);
    formData.append("video", file);

    message.innerHTML = `
        <div class="alert alert-info">
            Uploading video... Please wait.
        </div>
    `;

    fetch("http://localhost:3000/upload-video",{
        method:"POST",
        body:formData
    })
    .then(res=>res.text())
    .then(data=>{
        message.innerHTML = `
            <div class="alert alert-success">
                ${data}
            </div>
        `;

        document.getElementById("title").value="";
        document.getElementById("video").value="";
        document.getElementById("fileName").innerText="";
    })
    .catch(()=>{
        message.innerHTML = `
            <div class="alert alert-danger">
                Upload failed. Try again.
            </div>
        `;
    });

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

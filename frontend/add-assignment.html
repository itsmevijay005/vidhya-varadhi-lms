<!DOCTYPE html>
<html>
<head>
    <title>Assignment Builder | Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:linear-gradient(135deg,#0a1f44,#1f4aa8);
            min-height:100vh;
        }

        .navbar{
            background:transparent;
        }

        .main-card{
            border-radius:20px;
            border:none;
        }

        .card-header{
            background:linear-gradient(90deg,#6610f2,#8e44ad);
            color:white;
            text-align:center;
            padding:20px;
        }

        .question-box{
            background:#f8f9fa;
            padding:20px;
            border-radius:15px;
            margin-bottom:20px;
            position:relative;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        .delete-btn{
            position:absolute;
            top:10px;
            right:10px;
        }

        .form-control{
            border-radius:10px;
        }

        .btn-custom{
            border-radius:10px;
            padding:10px 20px;
            transition:0.3s;
        }

        .btn-custom:hover{
            transform:scale(1.05);
        }

        .footer{
            text-align:center;
            color:white;
            margin-top:40px;
            padding:15px;
            font-size:14px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4 d-flex justify-content-between">
    <span class="navbar-brand fw-bold text-white">
        <i class="bi bi-journal-check"></i>
        VIDHYA VARADHI Admin
    </span>

    <button class="btn btn-light btn-custom"
        onclick="goBack()">
        ← Back Dashboard
    </button>
</nav>

<div class="container mt-4 mb-5">

    <div class="card shadow-lg main-card">

        <div class="card-header">
            <h4><i class="bi bi-clipboard-plus"></i> Assignment Builder</h4>
            <small>Create Final Assignment (MCQ Format)</small>
        </div>

        <div class="card-body p-4">

            <!-- Course Dropdown -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Select Course</label>
                <select id="course_id" class="form-control"></select>
            </div>

            <!-- Questions -->
            <div id="questionsContainer"></div>

            <div class="d-flex justify-content-between mt-3">
                <button class="btn btn-secondary btn-custom"
                    onclick="addQuestion()">
                    <i class="bi bi-plus-circle"></i> Add Question
                </button>

                <button class="btn btn-success btn-custom"
                    onclick="saveAssignment()">
                    <i class="bi bi-save"></i> Save Assignment
                </button>
            </div>

            <div id="message" class="mt-3"></div>

        </div>

    </div>

</div>

<div class="footer">
    © 2026 Vidhya Varadhi LMS | Assignment Builder Panel
</div>

<script>

let questionCount = 0;

// ================= LOAD COURSES =================
window.onload = function(){

    fetch("http://localhost:3000/courses")
    .then(res=>res.json())
    .then(data=>{

        let options = "";
        data.forEach(course=>{
            options += `<option value="${course.id}">
                ${course.title}
            </option>`;
        });

        document.getElementById("course_id").innerHTML = options;

        loadExistingQuestions();
    });
};


// Reload when course changes
document.getElementById("course_id")
.addEventListener("change", loadExistingQuestions);


// ================= LOAD EXISTING QUESTIONS =================
function loadExistingQuestions(){

    const courseId = document.getElementById("course_id").value;

    fetch(`http://localhost:3000/admin-assignment/${courseId}`)
    .then(res=>res.json())
    .then(data=>{

        document.getElementById("questionsContainer").innerHTML = "";
        questionCount = 0;

        data.forEach(q=>{
            addQuestion(q);
        });
    });
}


// ================= ADD QUESTION BLOCK =================
function addQuestion(existingData = null){

    questionCount++;

    const html = `
    <div class="question-box" data-id="${existingData ? existingData.id : ''}">

        <div class="d-flex justify-content-between align-items-center">
            <h5>Question ${questionCount}</h5>
            ${
                existingData
                ?
                `<button class="btn btn-sm btn-danger"
                    onclick="deleteQuestion(${existingData.id})">
                    Delete
                </button>`
                :
                ""
            }
        </div>

        <textarea class="form-control mb-2 question"
            placeholder="Enter Question">${existingData ? existingData.question : ""}</textarea>

        <input type="text" class="form-control mb-2 option1"
            placeholder="Option 1"
            value="${existingData ? existingData.option1 : ""}">

        <input type="text" class="form-control mb-2 option2"
            placeholder="Option 2"
            value="${existingData ? existingData.option2 : ""}">

        <input type="text" class="form-control mb-2 option3"
            placeholder="Option 3"
            value="${existingData ? existingData.option3 : ""}">

        <input type="text" class="form-control mb-2 option4"
            placeholder="Option 4"
            value="${existingData ? existingData.option4 : ""}">

        <input type="text" class="form-control mb-2 answer"
            placeholder="Correct Answer"
            value="${existingData ? existingData.answer : ""}">
    </div>
    `;

    document.getElementById("questionsContainer")
        .insertAdjacentHTML("beforeend", html);
}


// ================= SAVE NEW QUESTIONS =================
function saveAssignment(){

    const course_id =
        document.getElementById("course_id").value;

    const blocks =
        document.querySelectorAll(".question-box");

    let questions = [];

    blocks.forEach(block=>{

        const dbId = block.getAttribute("data-id");

        // Only save NEW questions (no db id yet)
        if(!dbId){

            const question =
                block.querySelector(".question").value;

            const option1 =
                block.querySelector(".option1").value;

            const option2 =
                block.querySelector(".option2").value;

            const option3 =
                block.querySelector(".option3").value;

            const option4 =
                block.querySelector(".option4").value;

            const answer =
                block.querySelector(".answer").value;

            if(question.trim() !== ""){
                questions.push({
                    question,
                    option1,
                    option2,
                    option3,
                    option4,
                    answer
                });
            }
        }
    });

    if(questions.length === 0){
        alert("No new questions to save.");
        return;
    }

    fetch("http://localhost:3000/add-assignment-questions",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            course_id,
            questions
        })
    })
    .then(res=>res.text())
    .then(msg=>{
        alert(msg);
        loadExistingQuestions();
    });
}


// ================= DELETE QUESTION =================
function deleteQuestion(id){

    if(!confirm("Are you sure you want to delete this question?"))
        return;

    fetch(`http://localhost:3000/delete-assignment-question/${id}`,{
        method:"DELETE"
    })
    .then(res=>res.text())
    .then(msg=>{
        alert(msg);
        loadExistingQuestions();
    });
}


// ================= BACK =================
function goBack(){
    window.location.href="admin-dashboard.html";
}

</script>

</body>
</html>

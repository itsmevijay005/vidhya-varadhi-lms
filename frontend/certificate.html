<!DOCTYPE html>
<html>
<head>
    <title>Course Certificate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .certificate-container{
            width:900px;
            background:white;
            padding:60px;
            border:15px solid #0a1f44;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 40px rgba(0,0,0,0.15);
            position:relative;
        }

        .certificate-title{
            font-size:36px;
            font-weight:bold;
            color:#0a1f44;
            margin-bottom:20px;
        }

        .student-name{
            font-size:32px;
            font-weight:bold;
            color:#1f4aa8;
            margin:20px 0;
        }

        .course-title{
            font-size:24px;
            font-weight:600;
            margin:15px 0;
        }

        .score{
            font-size:20px;
            margin-top:15px;
        }

        .signature-section{
            margin-top:60px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .signature{
            text-align:center;
        }

        .signature img{
            width:150px;
        }

        .director-name{
            font-weight:bold;
        }

        .date{
            margin-top:20px;
            font-size:16px;
        }

        .download-btn{
            margin-top:30px;
        }

        @media print{
            .download-btn{
                display:none;
            }
        }
    </style>
</head>

<body>

<div class="certificate-container">

    <div class="certificate-title">
        VIDHYA VARADHI LMS
    </div>

    <h4>CERTIFICATE OF COMPLETION</h4>

    <p>This is to certify that</p>

    <div class="student-name" id="studentName"></div>

    <p>has successfully completed the course</p>

    <div class="course-title" id="courseTitle"></div>

    <div class="score">
        Final Score: <strong id="finalScore"></strong>
    </div>

    <div class="date">
        Date: <span id="date"></span>
    </div>

    <div class="signature-section">

        <div class="signature">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Signature_of_Elon_Musk.svg/512px-Signature_of_Elon_Musk.svg.png" alt="Signature">
            <div class="director-name">Dr. A. Sharma</div>
            <div>Course Director</div>
        </div>

        <div class="signature">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Signature_of_Sundar_Pichai.svg/512px-Signature_of_Sundar_Pichai.svg.png" alt="Signature">
            <div class="director-name">Academic Head</div>
            <div>Vidhya Varadhi LMS</div>
        </div>

    </div>

    <button class="btn btn-dark download-btn"
        onclick="window.print()">
        Download Certificate
    </button>

</div>

<script>

document.getElementById("studentName").innerText =
    localStorage.getItem("studentName");

document.getElementById("courseTitle").innerText =
    localStorage.getItem("courseTitle");

document.getElementById("finalScore").innerText =
    localStorage.getItem("finalPercentage") + "%";

document.getElementById("date").innerText =
    new Date().toLocaleDateString();

</script>

</body>
</html>

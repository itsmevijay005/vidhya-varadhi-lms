<!DOCTYPE html>
<html>
<head>
    <title>Course Videos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f5f7fa;
        }

        .navbar{
            background-color:#002147;
        }

        .video-card{
            transition:0.3s;
        }

        .video-card:hover{
            transform:scale(1.02);
        }
    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">NPTEL Course Videos</span>

        <button class="btn btn-light"
        onclick="goBack()">
            Back Dashboard
        </button>
    </div>
</nav>


<!-- MAIN CONTENT -->
<div class="container mt-4">

    <h4 class="mb-3 text-center">Course Videos</h4>

    <!-- VIDEO SECTION -->
    <div class="row" id="videos"></div>

</div>


<script>

// BACK BUTTON
function goBack(){
    window.location.href = "student-dashboard.html";
}


// AUTO LOAD VIDEOS (NEW)
window.onload = function(){

    const courseId = localStorage.getItem("course_id");

    fetch("http://localhost:3000/videos/" + courseId)
    .then(res => res.json())
    .then(data => {

        let output = "";

        data.forEach(video => {

            output += `
            <div class="col-md-8 mx-auto">

                <div class="card shadow video-card mb-4">

                    <div class="card-body">

                        <h5 class="mb-3">${video.title}</h5>

                        <video width="100%" controls class="rounded">
                            <source src="http://localhost:3000/uploads/${video.video_url}" type="video/mp4">
                        </video>

                    </div>

                </div>

            </div>
            `;
        });

        document.getElementById("videos").innerHTML = output;

    });
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

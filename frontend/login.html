<!DOCTYPE html>
<html>
<head>
<title>Login | VIDHYA VARADHI LMS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    height:100vh;
    margin:0;
    font-family:'Segoe UI',sans-serif;
}

/* LEFT SIDE */

.left-panel{
    background:linear-gradient(135deg,#1f4aa8,#0a1f44);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
}

.left-panel h1{
    font-weight:700;
}

.left-panel p{
    opacity:0.85;
}

/* RIGHT SIDE */

.right-panel{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f4f6f9;
}

/* LOGIN CARD */

.login-card{
    width:100%;
    max-width:420px;
    border-radius:15px;
    border:none;
}

.card-header{
    background:linear-gradient(90deg,#1f4aa8,#3b6edc);
    color:white;
    text-align:center;
    padding:25px;
}

/* BUTTONS */

.role-btn{
    font-weight:500;
    transition:0.3s;
}

.role-btn:hover{
    transform:translateY(-3px);
}

.login-btn{
    background:#1f4aa8;
    border:none;
    border-radius:8px;
}

.login-btn:hover{
    background:#0a1f44;
}

.form-control{
    border-radius:8px;
}

/* BACK BUTTON */

.back-btn{
    text-decoration:none;
    font-size:14px;
}

.fade-in{
    animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- LEFT PANEL -->

<div class="col-md-6 left-panel d-none d-md-flex">

<div>

<h1>VIDHYA VARADHI LMS</h1>

<p class="mt-3">
Empowering students through high quality courses,
expert faculty guidance, and professional certifications.
</p>

<div class="mt-4">

<i class="bi bi-mortarboard-fill fs-1"></i>

</div>

</div>

</div>


<!-- RIGHT PANEL -->

<div class="col-md-6 right-panel">

<div class="card shadow-lg login-card">

<div class="card-header">

<h4 class="mb-1">Welcome Back</h4>

<small>Login to continue learning</small>

</div>

<div class="card-body p-4">


<!-- ROLE SELECTION -->

<div id="roleSelection" class="fade-in">

<h5 class="text-center mb-4">Select Login Type</h5>

<button class="btn btn-success w-100 mb-3 role-btn"
onclick="selectRole('student')">

<i class="bi bi-mortarboard"></i> Student Login

</button>

<button class="btn btn-dark w-100 role-btn"
onclick="selectRole('admin')">

<i class="bi bi-person-badge"></i> Admin Login

</button>

</div>


<!-- LOGIN FORM -->

<div id="loginForm" style="display:none;" class="fade-in">

<h5 class="mb-3 text-center" id="loginTitle"></h5>

<input type="email" id="email"
class="form-control mb-3"
placeholder="Enter Email">

<input type="password" id="password"
class="form-control mb-3"
placeholder="Enter Password">

<button onclick="login()"
class="btn login-btn text-white w-100">

Login

</button>

<p id="message"
class="text-danger mt-2 text-center"></p>

<p class="text-center mt-3" id="registerSection">

New user?
<a href="register.html">Register here</a>

</p>

<div class="text-center mt-2">

<a href="#" class="back-btn"
onclick="goBack()">

← Back to Selection

</a>

</div>

</div>

</div>

</div>

</div>

</div>

</div>


<script>

let selectedRole = "";


function selectRole(role){

selectedRole = role;

document.getElementById("roleSelection").style.display = "none";
document.getElementById("loginForm").style.display = "block";

if(role === "student"){

document.getElementById("loginTitle").innerText =
"🎓 Student Login";

document.getElementById("registerSection").style.display =
"block";

}
else{

document.getElementById("loginTitle").innerText =
"👨‍💼 Admin Login";

document.getElementById("registerSection").style.display =
"none";

}

}


function goBack(){

document.getElementById("loginForm").style.display = "none";
document.getElementById("roleSelection").style.display = "block";
document.getElementById("message").innerText = "";

}



function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;


/* ADMIN LOGIN */

if(selectedRole === "admin"){

fetch("http://localhost:3000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})
.then(res=>res.json())
.then(data=>{

if(!data.role){

document.getElementById("message").innerText =
"Invalid Admin Credentials";

return;

}

if(data.role !== "admin"){

document.getElementById("message").innerText =
"Wrong login type selected!";

return;

}

localStorage.setItem("email",email);
localStorage.setItem("role",data.role);
localStorage.setItem("name",data.name);

window.location.href="admin-dashboard.html";

})
.catch(()=>{

document.getElementById("message").innerText =
"Login failed";

});

return;

}


/* STUDENT LOGIN */

fetch("http://localhost:3000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})
.then(res=>res.json())
.then(data=>{

if(!data.role){

document.getElementById("message").innerText =
"Invalid email or password";

return;

}

if(data.role !== "student"){

document.getElementById("message").innerText =
"Wrong login type selected!";

return;

}

localStorage.setItem("email",email);
localStorage.setItem("role",data.role);
localStorage.setItem("name",data.name);

window.location.href="student-dashboard.html";

})
.catch(()=>{

document.getElementById("message").innerText =
"Login failed";

});

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
